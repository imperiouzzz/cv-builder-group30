[phases.setup]
aptPkgs = [
  "chromium",
  "chromium-driver",
  "ca-certificates",
  "fonts-liberation",
  "libasound2t64",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdbus-1-3",
  "libgbm1",
  "libgtk-3-0",
  "libnspr4",
  "libnss3",
  "libxss1",
  "libxtst6",
  "xdg-utils"
]

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"